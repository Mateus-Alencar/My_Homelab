services:
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    shm_size: 128mb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
volumes:
  postgres_data:
networks:
  minha-rede:
    external: true