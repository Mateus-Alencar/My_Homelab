- name: Deploy WordPress com Docker Compose
  hosts: wordpress
  become: yes

  tasks:

    - name: Atualizar pacotes
      apt:
        update_cache: yes

    - name: Instalar dependências
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Garantir que o Docker está rodando
      service:
        name: docker
        state: started
        enabled: yes

    - name: Criar diretório do projeto
      file:
        path: /opt/wordpress
        state: directory

    - name: Copiar docker-compose.yml
      copy:
        src: files/docker-compose.yml
        dest: /opt/wordpress/docker-compose.yml

    - name: Copiar .env
      copy:
        src: files/.env
        dest: /opt/wordpress/.env

    - name: Subir containers
      command: docker-compose up -d
      args:
        chdir: /opt/wordpress